services:
  solvix-db:
    image: postgres:16-alpine
    container_name: solvix_db
    restart: always
    environment:
      - POSTGRES_USER=solvix
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=solvix
    volumes:
      - solvix_pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solvix"]
      interval: 10s
      timeout: 5s
      retries: 5

  solvix-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solvix_backend
    restart: always
    env_file: ./backend/.env.production
    depends_on:
      solvix-db:
        condition: service_healthy
    networks:
      - internal
      - proxy
    expose:
      - "4000"

volumes:
  solvix_pg_data:

networks:
  internal:
    driver: bridge
  proxy:
    external: true
